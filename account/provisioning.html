<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setting up your store · BestShopio</title>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <link rel="stylesheet" href="styles.css?v=20260610f" />
  <style>
    /* Provisioning progress — the "magic moment". Front-end polls the ops provision_task
       and lights up each sub-step. Visualizes what Shopify/SHOPLINE keep as a black box. */
    .prov-page { min-height: calc(100vh - 60px); background: #fff; padding: 40px 16px 64px; }
    .prov-card { width: 100%; max-width: 560px; margin: 0 auto; background: #fff; border: 1px solid #e6eaf3; border-radius: 16px; padding: 34px 34px 30px; text-align: center; box-shadow: 0 12px 36px rgba(41,56,99,.08); }
    .prov-ring { width: 104px; height: 104px; margin: 0 auto 18px; position: relative; }
    .prov-ring svg { transform: rotate(-90deg); }
    .prov-ring .pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 23px; font-weight: 800; color: var(--ink); }
    .prov-title { margin: 0 0 4px; font-size: 21px; font-weight: 700; color: #20242e; }
    .prov-desc { margin: 0 0 22px; color: var(--muted); font-size: 14px; line-height: 1.55; }
    .steps { text-align: left; border-top: 1px solid #eef1f7; }
    .step { display: flex; align-items: center; gap: 12px; padding: 11px 2px; border-bottom: 1px solid #f4f6fa; font-size: 14px; color: var(--muted); }
    .step:last-child { border-bottom: none; }
    .step .si { width: 24px; height: 24px; border-radius: 50%; flex: 0 0 auto; display: flex; align-items: center; justify-content: center; font-size: 12px; background: #f0f2f7; color: #aab0bd; border: 1px solid #e6eaf3; }
    .step .si svg { width: 13px; height: 13px; }
    .step.run { color: var(--ink); font-weight: 600; }
    .step.run .si { background: #eef2ff; color: var(--blue); border-color: #dbe3ff; }
    .step.done { color: var(--ink); }
    .step.done .si { background: #2bb673; color: #fff; border-color: #2bb673; }
    .spin { width: 13px; height: 13px; border: 2px solid var(--blue); border-top-color: transparent; border-radius: 50%; animation: sp .7s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
    .prov-done { margin-top: 22px; display: none; }
    .prov-done.show { display: block; }
    .prov-link { display: inline-flex; align-items: center; gap: 7px; margin-bottom: 16px; color: var(--blue); font-weight: 600; font-size: 14px; text-decoration: none; }
    .prov-link:hover { text-decoration: underline; }
    .prov-done .btn-primary { width: 100%; height: 44px; font-size: 15px; font-weight: 600; }
    .prov-leave { margin-top: 18px; color: var(--muted); font-size: 12.5px; }
    .prov-leave a { color: var(--blue); text-decoration: none; }
  </style>
</head>
<body>
  <header class="acct-header">
    <a class="acct-brand" href="stores.html"><span class="wordmark">BestShopio</span></a>
    <div class="acct-user">
      <button class="acct-avatar" id="avatar" aria-label="Account">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      </button>
      <div class="user-pop" id="user-pop" hidden>
        <div class="user-pop-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
          <span>zhengjican@bestfulfill.com</span>
        </div>
        <div class="user-pop-divider"></div>
        <div class="user-pop-actions">
          <a class="user-pop-item" href="signin.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg>
            Sign out
          </a>
        </div>
      </div>
    </div>
  </header>

  <main class="prov-page">
    <div class="prov-card">
      <div class="prov-ring">
        <svg width="104" height="104">
          <circle cx="52" cy="52" r="46" stroke="#eef1f7" stroke-width="8" fill="none"/>
          <circle id="ring" cx="52" cy="52" r="46" stroke="#3b66ff" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="289" stroke-dashoffset="289"/>
        </svg>
        <div class="pct" id="pct">0%</div>
      </div>
      <h1 class="prov-title" id="title">Setting up your store</h1>
      <p class="prov-desc" id="desc">This usually takes under 3 minutes. You can leave this page — we'll keep working in the background.</p>

      <div class="steps" id="steps"></div>

      <div class="prov-done" id="done">
        <a class="prov-link" id="store-link" href="#" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3a14.5 14.5 0 0 0 0 18 14.5 14.5 0 0 0 0-18"/></svg>
          <span id="store-domain">yourstore.bestshopio.com</span>
        </a>
        <a class="btn btn-primary" id="go-dash" href="#">Go to dashboard</a>
      </div>

      <div class="prov-leave" id="leave">You can safely close this tab — <a href="stores.html">back to stores</a>.</div>
    </div>
  </main>

  <div class="toast-host" id="toast-host"></div>

  <script src="auth.js?v=20260610b"></script>
  <script>
    // avatar dropdown
    var pop = document.getElementById('user-pop');
    document.getElementById('avatar').onclick = function (e) { e.stopPropagation(); pop.hidden = !pop.hidden; };
    document.addEventListener('click', function (e) { if (!e.target.closest('.acct-user')) pop.hidden = true; });

    var CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
    // step_key mirrors the ops provision_task sub-steps (PRD §5). Copy is merchant-facing.
    var STEPS = [
      { k: 'init_db',       t: 'Setting up your store database' },
      { k: 'init_redis',    t: 'Configuring cache' },
      { k: 'init_oss',      t: 'Preparing media storage' },
      { k: 'init_es',       t: 'Building product search index' },
      { k: 'init_mq',       t: 'Wiring up the message queue' },
      { k: 'create_oms',    t: 'Connecting order management' },
      { k: 'assign_domain', t: 'Assigning your store domain' },
      { k: 'issue_ssl',     t: 'Securing with SSL' },
      { k: 'init_email',    t: 'Setting up email & monitoring' },
      { k: 'seed_theme',    t: 'Loading your starter theme' }
    ];

    var qs = new URLSearchParams(location.search);
    var storeName = qs.get('store') || 'Your store';
    var slug = storeName.toLowerCase().replace(/[^a-z0-9]+/g, '').slice(0, 24) || 'yourstore';
    var domain = slug + '.stores.bestshopio.com';
    document.getElementById('title').textContent = 'Setting up ' + storeName;
    document.getElementById('store-domain').textContent = domain;
    document.getElementById('store-link').href = 'https://' + domain;
    // Go to dashboard -> enter the store admin; new=1 makes Home show the Setup guide.
    document.getElementById('go-dash').href = '../index.html?store=' + encodeURIComponent(storeName) + '&new=1#/home';

    var stepsEl = document.getElementById('steps');
    stepsEl.innerHTML = STEPS.map(function (s, i) {
      return '<div class="step" data-i="' + i + '"><span class="si">' + (i + 1) + '</span><span>' + s.t + '</span></div>';
    }).join('');
    var rows = stepsEl.querySelectorAll('.step');

    function setRing(p) {
      var c = 289, off = c - (c * p / 100);
      document.getElementById('ring').style.strokeDashoffset = off;
      document.getElementById('pct').textContent = Math.round(p) + '%';
    }

    // front-end polls task status every ~1.5s; here we simulate steps lighting up
    var i = 0;
    function tick() {
      if (i > 0) { var prev = rows[i - 1]; prev.className = 'step done'; prev.querySelector('.si').innerHTML = CHECK; }
      if (i >= rows.length) {
        setRing(100);
        document.getElementById('title').textContent = 'Your store is ready';
        document.getElementById('desc').textContent = 'Everything is set up. Add products, connect payments and go live.';
        document.getElementById('done').classList.add('show');
        document.getElementById('leave').style.display = 'none';
        return;
      }
      var cur = rows[i]; cur.className = 'step run';
      cur.querySelector('.si').innerHTML = '<span class="spin"></span>';
      setRing((i / rows.length) * 100);
      i++;
      setTimeout(tick, 850);
    }
    setTimeout(tick, 350);
  </script>
</body>
</html>
