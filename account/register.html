<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register · BestShopio</title>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <link rel="stylesheet" href="styles.css?v=20260609a" />
</head>
<body>
  <div class="signin-page">
    <section class="hero">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <p class="hero-kicker">Welcome to</p>
        <h1 class="hero-title">BestShopio</h1>
      </div>
    </section>

    <section class="form-panel">
      <div class="form-card">
        <h2 class="form-title">Register</h2>

        <form id="register-form" autocomplete="off" novalidate>
          <div class="fld">
            <div class="fld-wrap"><input id="email" class="fld-input" type="text" placeholder="Email" /></div>
            <div class="fld-error" data-err="email"></div>
          </div>

          <div class="fld">
            <div class="fld-wrap">
              <input id="code" class="fld-input has-suffix" type="text" placeholder="Verification code" />
              <button type="button" class="fld-suffix txt" id="send-code">Send</button>
            </div>
            <div class="fld-error" data-err="code"></div>
          </div>

          <div class="fld">
            <div class="fld-wrap">
              <input id="password" class="fld-input has-suffix" type="password" placeholder="Password" />
              <button type="button" class="fld-suffix" data-eye="password" aria-label="Show password"></button>
            </div>
            <div class="fld-error" data-err="password"></div>
          </div>

          <div class="fld">
            <div class="fld-wrap">
              <input id="confirm" class="fld-input has-suffix" type="password" placeholder="Confirm password" />
              <button type="button" class="fld-suffix" data-eye="confirm" aria-label="Show password"></button>
            </div>
            <div class="fld-error" data-err="confirm"></div>
          </div>

          <button type="submit" class="btn btn-primary signin-submit">Register</button>
        </form>

        <div class="divider" style="margin-top:18px"><span></span><em>or</em><span></span></div>
        <div class="oauth-list">
          <button type="button" class="oauth-btn" data-oauth="Google"><img src="assets/google.svg" alt="" /> Sign in with Google</button>
          <button type="button" class="oauth-btn" data-oauth="Lark"><img src="assets/lark.svg" alt="" /> Sign in with Lark</button>
        </div>

        <div class="meta-links" style="justify-content:center;margin-top:18px">
          <span style="color:var(--muted);font-size:14px">Already have an account? <a href="signin.html">Sign in</a></span>
        </div>
      </div>
    </section>
  </div>

  <div class="toast-host" id="toast-host"></div>
  <script src="auth.js?v=20260610a"></script>
  <script>
    Auth.wireEyes(document);

    document.getElementById('send-code').onclick = function () {
      var email = document.getElementById('email').value.trim();
      Auth.setErr('email', '');
      if (!email) { Auth.setErr('email', 'Please enter email'); return; }
      if (!Auth.validEmail(email)) { Auth.setErr('email', 'The email you entered is invalid'); return; }
      Auth.startCountdown(this);
      Auth.toast('Verification code sent');
    };

    document.querySelectorAll('[data-oauth]').forEach(function (b) {
      b.onclick = function () { Auth.toast('Signed in with ' + b.getAttribute('data-oauth')); setTimeout(function () { location.href = 'stores.html'; }, 620); };
    });

    document.getElementById('register-form').onsubmit = function (e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      var code = document.getElementById('code').value.trim();
      var pw = document.getElementById('password').value;
      var cf = document.getElementById('confirm').value;
      var ok = true;
      Auth.clearErrs(['email', 'code', 'password', 'confirm']);
      if (!email) { Auth.setErr('email', 'Please enter email'); ok = false; }
      else if (!Auth.validEmail(email)) { Auth.setErr('email', 'The email you entered is invalid'); ok = false; }
      else if (/^taken@/i.test(email)) { Auth.setErr('email', 'The email has been registered'); ok = false; }
      if (!code) { Auth.setErr('code', 'Please enter verification code'); ok = false; }
      else if (!/^\d{6}$/.test(code)) { Auth.setErr('code', 'Incorrect verification code'); ok = false; }
      if (!pw) { Auth.setErr('password', 'Please enter password'); ok = false; }
      else if (pw.length < 8) { Auth.setErr('password', '8 characters minimum'); ok = false; }
      if (cf !== pw) { Auth.setErr('confirm', 'Passwords do not match.'); ok = false; }
      if (!ok) return;
      Auth.toast('Registration successful');
      setTimeout(function () { location.href = 'stores.html'; }, 600);
    };
  </script>
</body>
</html>
