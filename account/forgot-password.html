<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot password · BestShopio</title>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <link rel="stylesheet" href="styles.css?v=20260609a" />
</head>
<body>
  <div class="signin-page">
    <section class="hero">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <p class="hero-kicker">Welcome to</p>
        <h1 class="hero-title">BestShopio</h1>
      </div>
    </section>

    <section class="form-panel">
      <div class="form-card">

        <!-- Step 1: verify email + code -->
        <div data-step="1">
          <h2 class="form-title" style="margin-bottom:8px">Forgot password</h2>
          <p style="color:var(--muted);font-size:13px;margin:0 0 24px">Please verify your login account to reset your password</p>
          <form id="verify-form" autocomplete="off" novalidate>
            <div class="fld">
              <div class="fld-wrap"><input id="email" class="fld-input" type="text" placeholder="Email" /></div>
              <div class="fld-error" data-err="email"></div>
            </div>
            <div class="fld">
              <div class="fld-wrap">
                <input id="code" class="fld-input has-suffix" type="text" placeholder="Verification code" />
                <button type="button" class="fld-suffix txt" id="send-code">Send</button>
              </div>
              <div class="fld-error" data-err="code"></div>
            </div>
            <button type="submit" class="btn btn-primary signin-submit">Verification</button>
          </form>
          <div class="meta-links" style="justify-content:center;margin-top:16px">
            <a href="signin.html">Go to sign in</a>
          </div>
        </div>

        <!-- Step 2: new password -->
        <div data-step="2" hidden>
          <h2 class="form-title">Reset password</h2>
          <form id="reset-form" autocomplete="off" novalidate>
            <div class="fld">
              <div class="fld-wrap">
                <input id="newpw" class="fld-input has-suffix" type="password" placeholder="New password" />
                <button type="button" class="fld-suffix" data-eye="newpw" aria-label="Show password"></button>
              </div>
              <div class="fld-error" data-err="newpw"></div>
            </div>
            <div class="fld">
              <div class="fld-wrap">
                <input id="confirmpw" class="fld-input has-suffix" type="password" placeholder="Confirm new password" />
                <button type="button" class="fld-suffix" data-eye="confirmpw" aria-label="Show password"></button>
              </div>
              <div class="fld-error" data-err="confirmpw"></div>
            </div>
            <button type="submit" class="btn btn-primary signin-submit">OK</button>
          </form>
        </div>

        <!-- Step 3: success -->
        <div data-step="3" hidden style="text-align:center;padding-top:8px">
          <div class="modal-success-ico" id="ok-ico"></div>
          <div style="font-size:16px;font-weight:600;color:#1f2430">Success!</div>
          <div style="color:var(--muted);font-size:14px;margin:6px 0 22px">Your password has been reset.</div>
          <a href="signin.html" class="btn btn-primary signin-submit" style="display:flex;text-decoration:none">Sign in now</a>
        </div>

      </div>
    </section>
  </div>

  <div class="toast-host" id="toast-host"></div>
  <script src="auth.js?v=20260610a"></script>
  <script>
    Auth.wireEyes(document);
    document.getElementById('ok-ico').innerHTML = Auth.CHECK;
    function showStep(n) { document.querySelectorAll('[data-step]').forEach(function (el) { el.hidden = el.getAttribute('data-step') !== String(n); }); }

    document.getElementById('send-code').onclick = function () {
      var email = document.getElementById('email').value.trim();
      Auth.setErr('email', '');
      if (!email) { Auth.setErr('email', 'Please enter email'); return; }
      if (!Auth.validEmail(email)) { Auth.setErr('email', 'The email you entered is invalid'); return; }
      Auth.startCountdown(this);
      Auth.toast('Verification code sent');
    };

    // step 1 -> step 2
    document.getElementById('verify-form').onsubmit = function (e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      var code = document.getElementById('code').value.trim();
      var ok = true;
      Auth.clearErrs(['email', 'code']);
      if (!email) { Auth.setErr('email', 'Please enter email'); ok = false; }
      else if (!Auth.validEmail(email)) { Auth.setErr('email', 'The email you entered is invalid'); ok = false; }
      else if (/^ghost@/i.test(email)) { Auth.setErr('email', 'The email you entered is not registered'); ok = false; }
      if (!code) { Auth.setErr('code', 'Please enter verification code'); ok = false; }
      else if (!/^\d{6}$/.test(code)) { Auth.setErr('code', 'Incorrect verification code'); ok = false; }
      if (!ok) return;
      showStep(2);
    };

    // step 2 -> step 3
    document.getElementById('reset-form').onsubmit = function (e) {
      e.preventDefault();
      var pw = document.getElementById('newpw').value;
      var cf = document.getElementById('confirmpw').value;
      var ok = true;
      Auth.clearErrs(['newpw', 'confirmpw']);
      if (!pw) { Auth.setErr('newpw', 'Please enter password'); ok = false; }
      else if (pw.length < 8) { Auth.setErr('newpw', '8 characters minimum'); ok = false; }
      if (cf !== pw) { Auth.setErr('confirmpw', 'Passwords do not match.'); ok = false; }
      if (!ok) return;
      showStep(3);
    };
  </script>
</body>
</html>
