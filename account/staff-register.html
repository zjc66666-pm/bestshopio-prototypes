<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Complete registration · BestShopio</title>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <link rel="stylesheet" href="styles.css?v=20260609a" />
</head>
<body>
  <div class="signin-page">
    <section class="hero">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <p class="hero-kicker">Welcome to</p>
        <h1 class="hero-title">BestShopio</h1>
      </div>
    </section>

    <section class="form-panel">
      <div class="form-card">

        <!-- valid invite token -->
        <div id="invite-valid">
          <h2 class="form-title" style="font-size:24px;line-height:1.3;margin-bottom:8px">Please use the invited account to complete the registration</h2>
          <p style="color:var(--muted);font-size:13px;margin:0 0 18px">Please verify your login account to reset your password</p>
          <div style="margin-bottom:18px">
            <div style="color:var(--muted);font-size:13px">Current login account</div>
            <div id="invite-email" style="color:#2a2f3b;font-size:15px;font-weight:600;margin-top:4px">alvens@qq.com</div>
          </div>
          <form id="staff-form" autocomplete="off" novalidate>
            <div class="fld">
              <div class="fld-wrap">
                <input id="password" class="fld-input has-suffix" type="password" placeholder="Password" />
                <button type="button" class="fld-suffix" data-eye="password" aria-label="Show password"></button>
              </div>
              <div class="fld-error" data-err="password"></div>
            </div>
            <div class="fld">
              <div class="fld-wrap">
                <input id="confirm" class="fld-input has-suffix" type="password" placeholder="Confirm password" />
                <button type="button" class="fld-suffix" data-eye="confirm" aria-label="Show password"></button>
              </div>
              <div class="fld-error" data-err="confirm"></div>
            </div>
            <button type="submit" class="btn btn-primary signin-submit">Register</button>
          </form>
        </div>

        <!-- expired / invalid token -->
        <div id="invite-invalid" hidden style="text-align:center;padding-top:8px">
          <div class="modal-success-ico" id="warn-ico" style="background:#fdecea;color:#d4380d"></div>
          <div style="font-size:16px;font-weight:600;color:#1f2430">The invitation link has expired or is invalid</div>
          <div style="color:var(--muted);font-size:14px;margin:6px 0 22px">Please ask the store owner to send a new invitation.</div>
          <a href="signin.html" class="btn signin-submit" style="display:flex;text-decoration:none">Go to sign in</a>
        </div>

      </div>
    </section>
  </div>

  <div class="toast-host" id="toast-host"></div>
  <script src="auth.js?v=20260610a"></script>
  <script>
    var WARN = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>';
    var params = new URLSearchParams(location.search);
    var token = params.get('token');
    var email = params.get('email');
    if (email) document.getElementById('invite-email').textContent = email;

    // demo: ?token=expired (or no token) renders the invalid state; any other token = valid invite
    if (!token || /expired|invalid/i.test(token)) {
      document.getElementById('invite-valid').hidden = true;
      document.getElementById('invite-invalid').hidden = false;
      document.getElementById('warn-ico').innerHTML = WARN;
    } else {
      Auth.wireEyes(document);
      document.getElementById('staff-form').onsubmit = function (e) {
        e.preventDefault();
        var pw = document.getElementById('password').value;
        var cf = document.getElementById('confirm').value;
        var ok = true;
        Auth.clearErrs(['password', 'confirm']);
        if (!pw) { Auth.setErr('password', 'Please enter password'); ok = false; }
        else if (pw.length < 8) { Auth.setErr('password', '8 characters minimum'); ok = false; }
        if (cf !== pw) { Auth.setErr('confirm', 'Passwords do not match.'); ok = false; }
        if (!ok) return;
        Auth.toast('Registration successful');
        setTimeout(function () { location.href = 'stores.html'; }, 600);
      };
    }
  </script>
</body>
</html>
