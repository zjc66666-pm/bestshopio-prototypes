<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stores · BestShopio</title>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <link rel="stylesheet" href="styles.css?v=20260610f" />
  <style>
    /* "Create a new store" card — first cell of the grid (self-service entry) */
    .store-card-new { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 188px; padding: 22px; border: 1.5px dashed #b9c6ef; border-radius: 14px; background: #f4f7ff; color: var(--blue); text-align: center; text-decoration: none; transition: border-color .2s, background .2s, transform .2s; }
    .store-card-new:hover { border-color: var(--blue); background: #eef2ff; transform: translateY(-1px); }
    .store-card-new .plus { width: 46px; height: 46px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: #e3eaff; font-size: 28px; font-weight: 300; line-height: 1; margin-bottom: 12px; }
    .store-card-new .new-label { font-size: 15px; font-weight: 700; color: #2a3656; }
    .store-card-new .new-sub { font-size: 12.5px; color: var(--muted); margin-top: 4px; }
    .stores-actions { display: flex; align-items: center; gap: 10px; }
    .store-card.provisioning { cursor: pointer; }
    .store-setup-line { display: inline-flex; align-items: center; gap: 7px; }
    .store-setup-line .spin { width: 13px; height: 13px; border: 2px solid var(--blue); border-top-color: transparent; border-radius: 50%; animation: sp .7s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- ===== top bar ===== -->
  <header class="acct-header">
    <a class="acct-brand" href="stores.html"><span class="wordmark">BestShopio</span></a>
    <div class="acct-user">
      <button class="acct-avatar" id="avatar" aria-label="Account">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
      </button>
      <div class="user-pop" id="user-pop" hidden>
        <div class="user-pop-head">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
          <span>zhengjican@bestfulfill.com</span>
        </div>
        <div class="user-pop-divider"></div>
        <div class="user-pop-actions">
          <button class="user-pop-item" id="act-changepw">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Change password
          </button>
          <a class="user-pop-item" href="signin.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg>
            Sign out
          </a>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== stores panel ===== -->
  <div class="stores-page">
    <div class="stores-shell">
      <aside class="stores-sidebar">
        <button class="sidebar-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9h18l-1.5-5H4.5L3 9z"/><path d="M4 9v11h16V9"/><path d="M9 20v-6h6v6"/></svg>
          <span>Stores</span>
        </button>
      </aside>

      <section class="stores-main">
        <div class="stores-toolbar">
          <h1 class="welcome-title" id="greeting">Choose a store to get started</h1>
          <div class="stores-actions">
            <button class="btn" id="req-access">Request access to a store</button>
            <a class="btn btn-primary" href="create-store.html">Create store</a>
          </div>
        </div>
        <div class="store-grid" id="store-grid"></div>
      </section>
    </div>
  </div>

  <div id="modal-host"></div>
  <div class="toast-host" id="toast-host"></div>

  <script>
    var CHECK = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
    var XICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>';
    var EYE_OPEN = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>';
    var EYE_OFF = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M9.9 4.24A9.1 9.1 0 0 1 12 4c6.5 0 10 7 10 7a13.2 13.2 0 0 1-1.67 2.34M6.1 6.1A13.3 13.3 0 0 0 2 12s3.5 7 10 7a9 9 0 0 0 3.9-.86"/><path d="m1 1 22 22"/><path d="M9.9 9.9a3 3 0 0 0 4.2 4.2"/></svg>';

    // Stores the signed-in account can access. Only "Active" stores are enterable.
    // Access code 0815 is the demo code that matches a store in "Request access".
    var STORES = [
      { name: 'Lovocross',    url: 'm.lovocross.com',         status: 'Active',          orders: 1284, gmv: 48320.50 },
      { name: 'Silixwear-ES', url: 'www.silixwear-es.com',    status: 'Active',          orders: 326,  gmv: 12540.00 },
      { name: 'Nutrofuels',   url: 'nutrofuels.stores.bestshopio.com', status: 'Provisioning', orders: '*', gmv: '*' },
      { name: 'Gigaxin',      url: 'www.gugaxin.com',         status: 'Active',          orders: 58,   gmv: 3180.00 },
      { name: 'Bumpbabe',     url: 'www.bumpbabe.com',        status: 'Request pending', orders: '*',  gmv: '*' }
    ];
    var TAG = { 'Active': 'tag-green', 'Provisioning': 'tag-blue', 'Request pending': 'tag-gold', 'Request rejected': 'tag-blue', 'No access': 'tag-gray' };

    function toast(msg, kind) {
      var host = document.getElementById('toast-host');
      var t = document.createElement('div');
      t.className = 'toast' + (kind === 'err' ? ' err' : '');
      t.innerHTML = (kind === 'err' ? '' : CHECK) + '<span>' + msg + '</span>';
      host.appendChild(t);
      setTimeout(function () { t.remove(); }, 2200);
    }
    function nf(n) { return Number(n).toLocaleString('en-US'); }
    function cur(n) { return '$ ' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

    // greeting by local hour
    (function () {
      var h = new Date().getHours();
      var part = h < 12 ? 'Good morning' : (h < 18 ? 'Good afternoon' : 'Good evening');
      document.getElementById('greeting').textContent = part + ', choose a store to get started';
    })();

    // render cards
    (function renderGrid() {
      var grid = document.getElementById('store-grid');
      // self-service entry — always the first cell
      var createCard = '<a class="store-card-new" href="create-store.html">' +
        '<div class="plus">+</div>' +
        '<div class="new-label">Create a new store</div>' +
        '<div class="new-sub">Live in under 3 minutes</div></a>';
      var cards = STORES.map(function (s) {
        var active = s.status === 'Active';
        var provisioning = s.status === 'Provisioning';
        var metrics = active
          ? '<div class="metric-col"><div class="metric-num">' + nf(s.orders) + '</div><div class="metric-label">Total order<br/>in 30 days</div></div>' +
            '<div class="metric-col"><div class="metric-num">' + cur(s.gmv) + '</div><div class="metric-label">Total order amount<br/>in 30 days</div></div>'
          : '<div class="metric-col"><div class="metric-num">- -</div><div class="metric-label">Total order<br/>in 30 days</div></div>' +
            '<div class="metric-col"><div class="metric-num">- -</div><div class="metric-label">Total order amount<br/>in 30 days</div></div>';
        var tag = '<span class="tag ' + (TAG[s.status] || 'tag-gray') + '">' + s.status + '</span>';
        var domainHtml = provisioning
          ? '<div class="store-domain"><span class="store-setup-line"><span class="spin"></span>Setting up your store…</span></div>'
          : '<div class="store-domain">' + s.url + '</div>';
        var open, closeTag;
        if (active) { open = '<a class="store-card" href="../index.html?store=' + encodeURIComponent(s.name) + '">'; closeTag = '</a>'; }
        else if (provisioning) { open = '<a class="store-card provisioning" href="provisioning.html?store=' + encodeURIComponent(s.name) + '">'; closeTag = '</a>'; }
        else { open = '<div class="store-card disabled" aria-disabled="true">'; closeTag = '</div>'; }
        return open +
            '<div class="store-card-head">' +
              '<div class="store-icon"><span class="awning"></span><span class="body"></span></div>' +
              '<div class="store-copy"><h2 class="store-name">' + s.name + '</h2>' +
                domainHtml + tag + '</div>' +
            '</div>' +
            '<div class="store-divider"></div>' +
            '<div class="store-metrics">' + metrics + '</div>' +
          closeTag;
      }).join('');
      grid.innerHTML = createCard + cards;
    })();

    // ===== avatar dropdown =====
    var pop = document.getElementById('user-pop');
    document.getElementById('avatar').onclick = function (e) { e.stopPropagation(); pop.hidden = !pop.hidden; };
    document.addEventListener('click', function (e) { if (!e.target.closest('.acct-user')) pop.hidden = true; });

    // ===== modal engine =====
    function modal(opts) {
      var host = document.getElementById('modal-host');
      var bd = document.createElement('div');
      bd.className = 'modal-backdrop';
      bd.innerHTML = '<div class="modal" style="width:' + (opts.width || 560) + 'px">' +
        (opts.success ? '' :
          '<div class="modal-head"><span>' + opts.title + '</span><button class="modal-x" data-x>' + XICON + '</button></div>') +
        '<div class="modal-body">' + opts.body + '</div>' +
        '<div class="modal-foot">' + (opts.foot || '') + '</div>' +
      '</div>';
      host.appendChild(bd);
      var close = function () { bd.remove(); };
      bd.addEventListener('click', function (e) { if (e.target === bd) close(); });
      var x = bd.querySelector('[data-x]'); if (x) x.onclick = close;
      if (opts.onMount) opts.onMount(bd, close);
      return { bd: bd, close: close };
    }
    function field(label, id, ph, opts) {
      opts = opts || {};
      var suffix = opts.eye ? '<button type="button" class="fld-suffix" data-eye="' + id + '"></button>' : '';
      return '<div class="fld"><div class="fld-label">' + label + '</div>' +
        '<div class="fld-wrap"><input id="' + id + '" class="fld-input' + (opts.eye ? ' has-suffix' : '') + '" type="' + (opts.eye ? 'password' : 'text') + '" placeholder="' + (ph || '') + '" />' + suffix + '</div>' +
        '<div class="fld-error" data-err="' + id + '"></div>' +
        (opts.hint ? '<div class="fld-hint">' + opts.hint + '</div>' : '') + '</div>';
    }
    function wireEyes(scope) {
      scope.querySelectorAll('[data-eye]').forEach(function (b) {
        var inp = scope.querySelector('#' + b.getAttribute('data-eye'));
        b.innerHTML = EYE_OFF;
        b.onclick = function () { var s = inp.type === 'password'; inp.type = s ? 'text' : 'password'; b.innerHTML = s ? EYE_OPEN : EYE_OFF; };
      });
    }
    function setErr(scope, id, msg) {
      var el = scope.querySelector('[data-err="' + id + '"]'); var inp = scope.querySelector('#' + id);
      if (el) el.textContent = msg || ''; if (inp) inp.classList.toggle('has-error', !!msg);
    }

    // ===== Request access to a store =====
    window.openRequestAccess = function () {
      var m = modal({
        title: 'Request access to a store', width: 560,
        body:
          field('Store name', 'rq-name', 'Please enter store name') +
          field('Store url', 'rq-url', 'Format: www.domain.com. Exclude protocols (https://)') +
          field('Access code', 'rq-code', 'Unique code shared by the store administrator') +
          '<div class="fld-error" data-err="rq-form" style="margin-top:2px"></div>',
        foot: '<button class="btn" data-cancel>Cancel</button><button class="btn btn-primary" data-add>Add</button>',
        onMount: function (bd, close) {
          bd.querySelector('[data-cancel]').onclick = close;
          bd.querySelector('[data-add]').onclick = function () {
            var name = bd.querySelector('#rq-name').value.trim();
            var url = bd.querySelector('#rq-url').value.trim();
            var code = bd.querySelector('#rq-code').value.trim();
            var ok = true;
            setErr(bd, 'rq-name', ''); setErr(bd, 'rq-url', ''); setErr(bd, 'rq-code', '');
            bd.querySelector('[data-err="rq-form"]').textContent = '';
            if (!name) { setErr(bd, 'rq-name', 'Please enter store name'); ok = false; }
            if (!url) { setErr(bd, 'rq-url', 'Please enter store url'); ok = false; }
            if (!code) { setErr(bd, 'rq-code', 'Please enter access code'); ok = false; }
            if (!ok) return;
            // demo: only access code 0815 matches a store
            if (code !== '0815') {
              bd.querySelector('[data-err="rq-form"]').textContent = 'The information provided does not match any store in our system. Please double-check your credentials';
              return;
            }
            close();
            modal({
              success: true, width: 520,
              body: '<div class="modal-success"><div class="modal-success-ico">' + CHECK + '</div>' +
                '<p class="lead">Request sent successfully!</p>' +
                '<p>A pending account request has been created.</p>' +
                '<p>Please wait for the store owner to approve your access.</p></div>',
              foot: '<button class="btn btn-primary" data-ok style="min-width:96px">OK</button>',
              onMount: function (b2, c2) { b2.querySelector('[data-ok]').onclick = c2; }
            });
          };
        }
      });
    };
    document.getElementById('req-access').onclick = window.openRequestAccess;

    // ===== Change password =====
    document.getElementById('act-changepw').onclick = function () {
      pop.hidden = true;
      var m = modal({
        title: 'Change password', width: 560,
        body:
          field('Current password', 'cp-cur', 'Enter current password', { eye: true }) +
          field('New password', 'cp-new', 'Enter new password', { eye: true }) +
          field('Confirm new password', 'cp-cf', 'Re-enter new password', { eye: true }),
        foot: '<button class="btn" data-cancel>Cancel</button><button class="btn btn-primary" data-done>Done</button>',
        onMount: function (bd, close) {
          wireEyes(bd);
          bd.querySelector('[data-cancel]').onclick = close;
          bd.querySelector('[data-done]').onclick = function () {
            var cur = bd.querySelector('#cp-cur').value, nw = bd.querySelector('#cp-new').value, cf = bd.querySelector('#cp-cf').value;
            var ok = true;
            setErr(bd, 'cp-cur', ''); setErr(bd, 'cp-new', ''); setErr(bd, 'cp-cf', '');
            if (!cur) { setErr(bd, 'cp-cur', 'Please enter current password'); ok = false; }
            if (!nw) { setErr(bd, 'cp-new', 'Please enter new password'); ok = false; }
            else if (nw.length < 8) { setErr(bd, 'cp-new', '8 characters minimum'); ok = false; }
            if (cf !== nw) { setErr(bd, 'cp-cf', 'Passwords do not match.'); ok = false; }
            if (!ok) return;
            close();
            toast('Change password successfully');
          };
        }
      });
    };
  </script>
</body>
</html>
