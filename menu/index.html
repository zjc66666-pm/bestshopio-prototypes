<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BestShopio · Menu</title>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/tailwind-config.js?v=20260607"></script>
  <link rel="stylesheet" href="../assets/theme.css?v=20260607" />
  <style>
    /* Menu module — scoped extras on top of the shared theme (.mnu-*) */

    /* sticky unsaved-changes bar (mirrors UnSavedChanges) */
    .mnu-savebar { display: flex; align-items: center; gap: 12px; background: #242833; color: #fff; border-radius: 10px; padding: 10px 14px; margin-bottom: 16px; box-shadow: var(--float-shadow); }
    .mnu-savebar .dotw { width: 8px; height: 8px; border-radius: 50%; background: var(--warn); flex: none; }
    .mnu-savebar .msg { font-size: 13px; font-weight: 500; }
    .mnu-savebar .spacer { margin-left: auto; }
    .mnu-savebar .btn-ghost { height: 30px; padding: 0 12px; border-radius: 7px; font-size: 13px; font-weight: 500; background: transparent; color: #fff; border: 1px solid rgb(255 255 255 / 30%); cursor: pointer; }
    .mnu-savebar .btn-ghost:hover { background: rgb(255 255 255 / 12%); }
    .mnu-savebar .btn-on { height: 30px; padding: 0 14px; border-radius: 7px; font-size: 13px; font-weight: 600; background: #fff; color: #242833; border: none; cursor: pointer; }

    /* items table: expand chevron + level indent + sort cell */
    .mnu-expand { display: inline-flex; align-items: center; justify-content: center; width: 18px; height: 18px; color: var(--ink-muted); background: transparent; border: none; cursor: pointer; flex: none; }
    .mnu-expand:hover { color: var(--ink); }
    .mnu-expand.placeholder { cursor: default; }
    .mnu-childrow td { background: #fbfcfe; }
    .mnu-child-label { padding-left: 30px; }
    .mnu-icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 7px; border: none; background: transparent; color: var(--ink-muted); cursor: pointer; }
    .mnu-icon-btn:hover { background: var(--panel); color: var(--ink); }
    .mnu-icon-btn.danger:hover { background: #fee2e2; color: var(--err); }
    .mnu-link-cell { display: block; max-width: 460px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--ink-body); font-variant-numeric: tabular-nums; }
    .mnu-help { display: inline-flex; align-items: center; gap: 4px; }
    .mnu-help .qm { color: var(--ink-muted); cursor: help; display: inline-flex; }

    /* radio group (menu item type) */
    .mnu-radio-row { display: flex; gap: 18px; }
    .mnu-radio { display: inline-flex; align-items: center; gap: 7px; font-size: 13.5px; color: var(--ink-body); cursor: pointer; }
    .mnu-radio input { width: 15px; height: 15px; accent-color: var(--brand); cursor: pointer; }
    .mnu-field-err { color: var(--err); font-size: 12px; margin-top: 4px; }
    .mnu-count { font-size: 11.5px; color: var(--ink-muted); float: right; }

    /* search field group (compact: select + input, matches Input.Group) */
    .mnu-group { display: inline-flex; align-items: stretch; }
    .mnu-group .filter-select { width: 150px; border-top-right-radius: 0; border-bottom-right-radius: 0; }
    .mnu-group .wrap { position: relative; width: 268px; margin-left: -1px; }
    .mnu-group .filter-input { width: 100%; padding-left: 12px; padding-right: 32px; border-top-left-radius: 0; border-bottom-left-radius: 0; }

    /* empty state */
    .mnu-empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 20px; }
    .mnu-empty-state h3 { font-size: 18px; font-weight: 600; color: var(--ink); margin: 14px 0 14px; }
  </style>
</head>
<body class="bg-page text-ink font-sans antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <div id="content-col" class="flex-1 flex flex-col min-w-0">
      <main id="view" class="flex-1 overflow-auto scroll-thin"><div class="view-wrap" id="root"></div></main>
    </div>
  </div>
  <script src="../assets/nav.js?v=20260607"></script>
  <script src="../assets/shell.js?v=20260607" data-base="../" data-active="menu"></script>
  <script src="js/data.js?v=20260607"></script>
  <script src="js/app.js?v=20260607"></script>
</body>
</html>
