<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BestShopio · Online store</title>
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="../assets/tailwind-config.js?v=20260607"></script>
  <link rel="stylesheet" href="../assets/theme.css?v=20260607" />
  <style>
    /* ---------- Online store module-scoped styles (prefix .os-) ---------- */

    /* Theme list */
    .os-theme-card { overflow: hidden; border-radius: 12px; border: 1px solid var(--hair); background: #fff; box-shadow: 0 1px 2px 0 rgb(16 24 40 / 4%); }
    .os-theme-previews { display: flex; gap: 20px; background: #f7f7f8; padding: 20px; }
    .os-prev-pc { min-width: 0; flex: 1 1 auto; overflow: hidden; border-radius: 6px; background: #fff; aspect-ratio: 16 / 10; }
    .os-prev-h5 { width: 34%; min-width: 230px; overflow: hidden; border-radius: 6px; background: #fff; aspect-ratio: 9 / 14; }
    .os-prev-pc img, .os-prev-h5 img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
    .os-theme-meta { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 18px 20px; }
    @media (max-width: 860px) { .os-prev-h5 { display: none; } }

    /* Live badge on the active theme */
    .os-live { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 600; color: #00684a; background: var(--ok-bg); border-radius: 9999px; padding: 2px 10px; }
    .os-live .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ok); }

    /* ---------- Builder (full-screen visual editor mock) ---------- */
    .os-builder { position: fixed; inset: 0; z-index: 40; background: #fff; display: flex; flex-direction: column; }
    .os-bld-top { display: grid; align-items: center; grid-template-columns: 1fr auto 1fr; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--hair); background: #fff; flex: none; }
    .os-bld-body { flex: 1; min-height: 0; display: flex; background: #f1f2f5; }

    /* page-type select trigger */
    .os-pagesel { display: inline-flex; align-items: center; justify-content: space-between; gap: 10px; height: 32px; padding: 0 10px; width: 180px; border: 1px solid var(--ctl); border-radius: var(--radius); background: #fff; font-size: 13px; color: var(--ink); cursor: pointer; }
    .os-pagesel:hover { border-color: var(--brand); }

    /* viewport segmented control */
    .os-seg { display: inline-flex; background: #eef0f7; border-radius: 8px; padding: 3px; gap: 2px; }
    .os-seg button { height: 26px; padding: 0 14px; border: none; background: transparent; border-radius: 6px; font-size: 13px; color: var(--ink-body); cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .os-seg button.active { background: #fff; color: var(--ink); font-weight: 500; box-shadow: 0 1px 2px rgb(16 24 40 / 8%); }

    /* LEFT — component / layers panel */
    .os-left { width: 280px; flex: 0 0 280px; background: #fff; border-right: 1px solid var(--hair); display: flex; flex-direction: column; min-height: 0; }
    .os-left-tabs { display: flex; gap: 4px; padding: 8px 10px 0; border-bottom: 1px solid var(--hair); }
    .os-left-tab { padding: 8px 10px; font-size: 13px; color: var(--ink-body); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .os-left-tab.active { color: var(--brand); border-bottom-color: var(--brand); font-weight: 500; }
    .os-left-scroll { flex: 1; overflow-y: auto; padding: 10px; }
    .os-lib-label { font-size: 11px; font-weight: 700; letter-spacing: .05em; color: var(--ink-muted); text-transform: uppercase; padding: 10px 4px 6px; }

    /* draggable component block in the library */
    .os-block { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border: 1px solid var(--hair); border-radius: 8px; background: #fff; margin-bottom: 8px; cursor: grab; user-select: none; }
    .os-block:hover { border-color: var(--brand); background: #f7faff; }
    .os-block-ico { width: 30px; height: 30px; flex: none; border-radius: 7px; background: #e6f0ff; color: var(--brand); display: grid; place-items: center; }
    .os-block-name { font-size: 13px; font-weight: 500; color: var(--ink); }
    .os-block-desc { font-size: 11.5px; color: var(--ink-muted); margin-top: 1px; }
    .os-block .os-grip { margin-left: auto; color: var(--ctl); flex: none; }

    /* layers list (sections currently on the page) */
    .os-layer { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border: 1px solid transparent; border-radius: 8px; cursor: pointer; }
    .os-layer:hover { background: var(--panel); }
    .os-layer.active { background: #e6f0ff; border-color: #cfe1ff; }
    .os-layer-ico { width: 26px; height: 26px; flex: none; border-radius: 6px; background: #eef0f7; color: var(--ink-body); display: grid; place-items: center; }
    .os-layer.active .os-layer-ico { background: #fff; color: var(--brand); }
    .os-layer-name { font-size: 13px; color: var(--ink); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .os-layer.fixed .os-layer-name { color: var(--ink-muted); }
    .os-layer-grip { color: var(--ctl); flex: none; cursor: grab; }

    /* CENTER — canvas */
    .os-center { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .os-canvas-bar { height: 38px; flex: none; display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--ink-muted); font-size: 12px; border-bottom: 1px solid var(--hair); background: #fafbfc; }
    .os-canvas-scroll { flex: 1; overflow-y: auto; padding: 22px; display: flex; justify-content: center; }
    .os-frame { background: #fff; box-shadow: var(--float-shadow); border-radius: 4px; overflow: hidden; transition: width .2s ease; }
    .os-frame.pc { width: 100%; max-width: 1080px; }
    .os-frame.mobile { width: 390px; }

    /* a selectable section inside the canvas */
    .os-sec { position: relative; cursor: pointer; outline: 2px solid transparent; outline-offset: -2px; }
    .os-sec:hover { outline-color: #bcd4ff; }
    .os-sec.active { outline-color: var(--brand); }
    .os-sec-tag { position: absolute; top: 0; left: 0; transform: translateY(-100%); background: var(--brand); color: #fff; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px 6px 0 0; display: none; white-space: nowrap; z-index: 3; }
    .os-sec.active .os-sec-tag { display: inline-block; }

    /* storefront mock primitives */
    .sf-utility { background: #242833; color: #fff; font-size: 11px; letter-spacing: .04em; text-align: center; padding: 7px 8px; }
    .sf-utility a { color: #fff; text-decoration: underline; margin-left: 6px; }
    .sf-header { display: flex; align-items: center; gap: 16px; padding: 12px 18px; border-bottom: 1px solid #eee; }
    .sf-logo { font-size: 20px; font-weight: 800; letter-spacing: .02em; color: #111; }
    .sf-nav { display: flex; gap: 16px; flex: 1; flex-wrap: wrap; }
    .sf-nav span { font-size: 12.5px; font-weight: 600; color: #333; text-transform: uppercase; }
    .sf-icons { display: flex; gap: 12px; color: #333; }

    .sf-hero { position: relative; aspect-ratio: 16 / 7; background-size: cover; background-position: center; display: flex; align-items: center; }
    .sf-hero.mob { aspect-ratio: 4 / 5; }
    .sf-hero-inner { padding: 0 6%; color: #fff; max-width: 60%; }
    .sf-hero-eyebrow { font-size: 12px; font-weight: 600; letter-spacing: .08em; text-shadow: 0 1px 4px rgb(0 0 0 / 40%); }
    .sf-hero-title { font-size: 34px; line-height: 1.05; font-weight: 800; margin: 8px 0 14px; text-shadow: 0 2px 8px rgb(0 0 0 / 45%); white-space: pre-line; }
    .sf-hero.mob .sf-hero-title { font-size: 26px; }
    .sf-hero-cta { display: inline-block; background: #fff; color: #111; font-size: 12px; font-weight: 700; letter-spacing: .06em; padding: 10px 20px; border-radius: 2px; }
    .sf-dots { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
    .sf-dots i { width: 7px; height: 7px; border-radius: 50%; background: rgb(255 255 255 / 55%); }
    .sf-dots i.on { background: #fff; }

    .sf-benefits { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 14px 18px; background: #fff5ec; }
    .sf-benefit { border: 1px dashed #f0a35a; border-radius: 8px; padding: 10px; text-align: center; }
    .sf-benefit .b-title { font-size: 17px; font-weight: 800; color: #d9480f; }
    .sf-benefit .b-sub { font-size: 11px; color: #9a3412; margin-top: 2px; }
    .sf-benefit.code .b-title { letter-spacing: .04em; }

    .sf-floor-title { font-size: 18px; font-weight: 700; text-align: center; padding: 18px 0 12px; color: #111; }
    .sf-cat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 18px 16px; }
    .sf-cat { border-radius: 8px; overflow: hidden; aspect-ratio: 3 / 4; background-size: cover; background-position: center; position: relative; }
    .sf-cat .lbl { position: absolute; left: 0; right: 0; bottom: 0; background: linear-gradient(transparent, rgb(0 0 0 / 60%)); color: #fff; font-size: 11px; font-weight: 600; padding: 14px 8px 8px; }

    .sf-promo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 18px 16px; }
    .sf-promo { border-radius: 8px; overflow: hidden; aspect-ratio: 1 / 1; background-size: cover; background-position: center; }

    .sf-tabs { display: flex; gap: 18px; justify-content: center; padding: 4px 0 14px; }
    .sf-tabs span { font-size: 13px; font-weight: 600; color: #888; padding-bottom: 4px; border-bottom: 2px solid transparent; }
    .sf-tabs span.on { color: #111; border-bottom-color: #111; }
    .sf-prod-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 0 18px 22px; }
    .sf-prod .ph { aspect-ratio: 3 / 4; border-radius: 8px; background-size: cover; background-position: center; }
    .sf-prod .nm { font-size: 12px; color: #333; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sf-prod .pr { font-size: 13px; font-weight: 700; color: #d9480f; margin-top: 2px; }
    .sf-prod .pr s { color: #aaa; font-weight: 400; margin-left: 5px; font-size: 11px; }

    .sf-footer { background: #f7f7f8; border-top: 1px solid #eee; padding: 22px 18px; }
    .sf-foot-cols { display: grid; grid-template-columns: repeat(3, 1fr) 1.4fr; gap: 18px; }
    .sf-foot-col h5 { font-size: 12px; font-weight: 700; color: #111; margin: 0 0 8px; text-transform: uppercase; letter-spacing: .03em; }
    .sf-foot-col a, .sf-foot-col p { display: block; font-size: 12px; color: #555; margin-bottom: 5px; text-decoration: none; }
    .sf-pay { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
    .sf-pay span { font-size: 10px; font-weight: 600; color: #444; background: #fff; border: 1px solid #e2e2e2; border-radius: 4px; padding: 3px 7px; }
    .sf-copy { text-align: center; font-size: 11px; color: #888; margin-top: 16px; border-top: 1px solid #e7e7e7; padding-top: 14px; }

    /* mobile single-column overrides inside frame */
    .os-frame.mobile .sf-nav { display: none; }
    .os-frame.mobile .sf-benefits { grid-template-columns: repeat(3, 1fr); }
    .os-frame.mobile .sf-cat-grid { grid-template-columns: repeat(3, 1fr); }
    .os-frame.mobile .sf-promo-grid { grid-template-columns: repeat(2, 1fr); }
    .os-frame.mobile .sf-prod-grid { grid-template-columns: repeat(2, 1fr); }
    .os-frame.mobile .sf-foot-cols { grid-template-columns: 1fr 1fr; }
    .os-frame.mobile .sf-hero-inner { max-width: 86%; }

    /* RIGHT — settings panel */
    .os-right { width: 300px; flex: 0 0 300px; background: #fff; border-left: 1px solid var(--hair); display: flex; flex-direction: column; min-height: 0; }
    .os-right-head { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--hair); }
    .os-right-head .ico { width: 30px; height: 30px; flex: none; border-radius: 7px; background: #e6f0ff; color: var(--brand); display: grid; place-items: center; }
    .os-right-title { font-size: 14px; font-weight: 600; color: var(--ink); }
    .os-right-sub { font-size: 11.5px; color: var(--ink-muted); }
    .os-right-scroll { flex: 1; overflow-y: auto; padding: 14px 16px 28px; }
    .os-fld { margin-bottom: 14px; }
    .os-fld-label { font-size: 12px; font-weight: 600; color: var(--ink-body); margin-bottom: 5px; display: flex; align-items: center; justify-content: space-between; }
    .os-fld .input, .os-fld textarea.input { font-size: 13px; }
    .os-fld textarea.input { height: auto; padding: 8px 12px; resize: vertical; line-height: 1.5; }
    .os-subhead { font-size: 11px; font-weight: 700; letter-spacing: .05em; color: var(--ink-muted); text-transform: uppercase; margin: 6px 0 10px; padding-top: 6px; border-top: 1px solid var(--hair); }
    .os-empty-right { color: var(--ink-muted); font-size: 13px; text-align: center; padding: 40px 10px; line-height: 1.6; }

    /* repeater item (slides / benefits / nav links) */
    .os-rep { border: 1px solid var(--hair); border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; background: var(--panel); }
    .os-rep-head { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
    .os-rep-thumb { width: 30px; height: 30px; border-radius: 5px; object-fit: cover; flex: none; }
    .os-rep-head .x { margin-left: auto; color: var(--ink-muted); cursor: pointer; }
    .os-rep-head .x:hover { color: var(--err); }
    .os-mini { width: 100%; height: 30px; padding: 0 8px; border: 1px solid var(--ctl); border-radius: 6px; font-size: 12px; color: var(--ink); }
    .os-mini:focus { outline: none; border-color: var(--brand); }
    .os-add-rep { width: 100%; padding: 7px; border: 1px dashed var(--ctl); border-radius: 8px; background: #fff; font-size: 12.5px; color: var(--brand); cursor: pointer; }
    .os-add-rep:hover { background: #f1f6ff; }

    /* color swatch row */
    .os-swatch { display: flex; align-items: center; gap: 8px; }
    .os-swatch .chip-color { width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--hair); flex: none; }

    /* toggle */
    .os-toggle { width: 38px; height: 22px; border-radius: 9999px; background: var(--ctl); position: relative; cursor: pointer; flex: none; transition: background .15s; }
    .os-toggle.on { background: var(--brand); }
    .os-toggle i { position: absolute; top: 2px; left: 2px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: left .15s; }
    .os-toggle.on i { left: 18px; }
  </style>
</head>
<body class="bg-page text-ink font-sans antialiased">
  <div id="app" class="flex h-screen overflow-hidden">
    <div id="content-col" class="flex-1 flex flex-col min-w-0">
      <main id="view" class="flex-1 overflow-auto scroll-thin"><div class="view-wrap" id="root"></div></main>
    </div>
  </div>
  <script src="../assets/nav.js?v=20260607"></script>
  <script src="../assets/shell.js?v=20260607" data-base="../" data-active="online-store"></script>
  <script src="js/data.js?v=20260607"></script>
  <script src="js/app.js?v=20260607"></script>
</body>
</html>
